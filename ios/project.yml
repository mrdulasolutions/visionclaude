name: ClaudeVision
options:
  bundleIdPrefix: com.claudevision
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"

targets:
  ClaudeVision:
    type: application
    platform: iOS
    sources:
      - ClaudeVision
    settings:
      base:
        INFOPLIST_FILE: ClaudeVision/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.claudevision.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
